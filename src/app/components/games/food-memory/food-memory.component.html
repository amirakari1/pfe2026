<div class="game-container">
  <div class="game-header">
    <button class="home-button" (click)="goHome()">🏠 {{ translate('nav.home') }}</button>
    <h1>🧠 {{ translate('game.memory.title') }}</h1>
    <div class="stat" *ngIf="gameStarted">{{ translate('game.moves') }}: {{ moves }}</div>
  </div>

  <div class="game-content">
    <div class="welcome-screen" *ngIf="!gameStarted">
      <h2>{{ translate('game.memory.welcome') }}</h2>
      <p>{{ translate('game.memory.description') }}</p>
      <button class="start-button" (click)="startGame()">{{ translate('game.start') }}</button>
    </div>

    <div class="play-screen" *ngIf="gameStarted">
      <div class="cards-grid">
        <div *ngFor="let card of cards" class="card" [class.flipped]="card.flipped" [class.matched]="card.matched">
          <div class="card-inner" (click)="flipCard(card)">
            <div class="card-front">?</div>
            <div class="card-back">
              <span class="card-emoji">{{ card.emoji }}</span>
              <span class="card-fact">{{ translate(card.fact) }}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="win-message" *ngIf="allMatched">
        <p>🎉 {{ translate('game.memory.perfect') }}</p>
        <button class="start-button" (click)="startGame()">{{ translate('game.restart') }}</button>
        <button class="home-button-large" (click)="goHome()">{{ translate('nav.home') }}</button>
      </div>
    </div>
  </div>
</div>
